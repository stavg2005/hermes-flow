services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermes-flow-frontend
    ports:
      - '80:80'
    networks:
      - hermes-network
    depends_on:
      - minio
    restart: always

  minio:
    image: minio/minio:latest
    container_name: hermes-flow-minio
    ports:
      - '9000:9000' # MinIO API
      - '9001:9001' # MinIO Console UI
    # In production, use environment variables from .env
    env_file:
      - .env
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - hermes-network
    restart: always
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  minio-data:

networks:
  hermes-network:
    driver: bridge
